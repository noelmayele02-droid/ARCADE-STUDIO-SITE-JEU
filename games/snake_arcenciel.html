<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Snake Arc-en-ciel</title>
<style>
  :root{ --accent:#ff5fa2; --accent2:#7a5fff; }
  html,body{
    margin:0; height:100%;
    background:radial-gradient(ellipse at top, #2a1a5e, #0b1026);
    display:flex; align-items:center; justify-content:center;
    font-family:'Trebuchet MS', system-ui, sans-serif;
    overflow:hidden;
  }
  #wrap{ position:relative; border-radius:12px; overflow:hidden; border:3px solid rgba(255,255,255,0.15); box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  canvas{ display:block; background:#181233; touch-action:none; }
  #hud{ position:absolute; top:10px; left:14px; right:14px; display:flex; justify-content:space-between; color:#fff; font-size:16px; font-weight:bold; text-shadow:0 2px 6px rgba(0,0,0,0.6); pointer-events:none; user-select:none; }
  #overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; background:rgba(10,8,30,0.62); backdrop-filter:blur(2px); padding:20px; box-sizing:border-box; }
  #overlay h1{ margin:0 0 8px 0; font-size:24px; background:linear-gradient(90deg,#ff5f6d,#ffc371,#8fff5f,#5fdcff,#a15fff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #overlay p{ margin:4px 0; font-size:13px; opacity:0.9; }
  .btn{ margin-top:16px; padding:12px 26px; font-size:18px; font-weight:bold; color:white; background:linear-gradient(90deg,var(--accent),var(--accent2)); border:none; border-radius:30px; cursor:pointer; box-shadow:0 6px 18px rgba(255,95,162,0.5); }
  .btn:active{ transform:scale(0.97); }
  .hidden{ display:none !important; }
  #mobileControls{ position:absolute; bottom:10px; right:10px; display:grid; grid-template-columns:repeat(3,42px); grid-template-rows:repeat(3,42px); gap:4px; }
  .padBtn{ border-radius:10px; background:rgba(255,255,255,0.14); border:2px solid rgba(255,255,255,0.25); color:#fff; display:flex; align-items:center; justify-content:center; font-size:17px; user-select:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="440" height="440"></canvas>
  <div id="hud">
    <span id="scoreLabel">Score : 0</span>
    <span id="bestLabel">Record : 0</span>
  </div>
  <div id="mobileControls">
    <div></div><div class="padBtn" id="up">▲</div><div></div>
    <div class="padBtn" id="left">◀</div><div></div><div class="padBtn" id="right">▶</div>
    <div></div><div class="padBtn" id="down">▼</div><div></div>
  </div>
  <div id="overlay">
    <h1>🐍🌈 Snake Arc-en-ciel</h1>
    <p>Flèches ou ZQSD pour diriger le serpent</p>
    <p>Mange les pastilles arc-en-ciel pour grandir</p>
    <p>Évite les murs et ta propre queue !</p>
    <button class="btn" id="playBtn">Jouer</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const scoreLabel = document.getElementById('scoreLabel');
const bestLabel = document.getElementById('bestLabel');

const CELL = 22;
const COLS = W/CELL, ROWS = H/CELL;
const rainbowColors = ['#ff5f6d','#ffc371','#f9f871','#8fff5f','#5fdcff','#a15fff'];

let state = 'ready';
let snake, dir, nextDir, food, score, best=0, tickTimer, tickInterval;

function resetGame(){
  snake = [{x:8,y:10},{x:7,y:10},{x:6,y:10}];
  dir = {x:1,y:0};
  nextDir = {x:1,y:0};
  score = 0;
  tickInterval = 130;
  tickTimer = 0;
  placeFood();
  updateHud();
}

function placeFood(){
  let ok=false, fx,fy;
  while(!ok){
    fx = Math.floor(Math.random()*COLS);
    fy = Math.floor(Math.random()*ROWS);
    ok = !snake.some(s=>s.x===fx&&s.y===fy);
  }
  food = {x:fx,y:fy,colorIndex:Math.floor(Math.random()*rainbowColors.length)};
}

function updateHud(){
  scoreLabel.textContent = 'Score : ' + score;
  bestLabel.textContent = 'Record : ' + best;
}

function startGame(){
  resetGame();
  state = 'playing';
  overlay.classList.add('hidden');
}

function endGame(){
  state = 'dead';
  best = Math.max(best,score);
  updateHud();
  overlay.classList.remove('hidden');
  overlay.innerHTML = `<h1>💥 Aïe !</h1><p>Score : <strong>${score}</strong></p><p>Record : <strong>${best}</strong></p><button class="btn" id="playBtn2">Rejouer</button>`;
  document.getElementById('playBtn2').addEventListener('click', startGame);
}

function setDir(x,y){
  if(dir.x===-x && dir.y===-y) return; // pas de demi-tour
  nextDir = {x,y};
}

window.addEventListener('keydown',(e)=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if(state==='ready' && e.code!=='Space') startGame();
  if(e.code==='ArrowUp'||e.code==='KeyW'||e.code==='KeyZ') setDir(0,-1);
  if(e.code==='ArrowDown'||e.code==='KeyS') setDir(0,1);
  if(e.code==='ArrowLeft'||e.code==='KeyA'||e.code==='KeyQ') setDir(-1,0);
  if(e.code==='ArrowRight'||e.code==='KeyD') setDir(1,0);
});

function bindPad(id,x,y){
  document.getElementById(id).addEventListener('click', ()=>{
    if(state==='ready') startGame();
    setDir(x,y);
  });
}
bindPad('up',0,-1); bindPad('down',0,1); bindPad('left',-1,0); bindPad('right',1,0);
document.getElementById('playBtn').addEventListener('click', startGame);

function update(dt){
  if(state!=='playing') return;
  tickTimer += dt;
  if(tickTimer < tickInterval) return;
  tickTimer = 0;

  dir = nextDir;
  const head = {x: snake[0].x+dir.x, y: snake[0].y+dir.y};

  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){ endGame(); return; }
  if(snake.some(s=>s.x===head.x && s.y===head.y)){ endGame(); return; }

  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){
    score += 10;
    tickInterval = Math.max(70, tickInterval-2);
    updateHud();
    placeFood();
  } else {
    snake.pop();
  }
}

function drawGrid(){
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for(let x=0;x<=COLS;x++){ ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
  for(let y=0;y<=ROWS;y++){ ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }
}

function drawSnake(){
  snake.forEach((s,i)=>{
    const color = rainbowColors[i % rainbowColors.length];
    ctx.save();
    ctx.fillStyle = color;
    const pad = i===0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+pad, s.y*CELL+pad, CELL-pad*2, CELL-pad*2, 6);
    ctx.fill();
    if(i===0){
      ctx.fillStyle = '#1a1a1a';
      const ex = dir.x, ey=dir.y;
      const cx = s.x*CELL+CELL/2, cy = s.y*CELL+CELL/2;
      ctx.beginPath(); ctx.arc(cx+ex*4-ey*5, cy+ey*4+ex*5, 2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+ex*4+ey*5, cy+ey*4-ex*5, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function drawFood(){
  const cx = food.x*CELL+CELL/2, cy = food.y*CELL+CELL/2;
  const grad = ctx.createRadialGradient(cx-3,cy-3,1,cx,cy,CELL/2-2);
  grad.addColorStop(0,'#ffffff');
  grad.addColorStop(0.3, rainbowColors[food.colorIndex]);
  grad.addColorStop(1, rainbowColors[food.colorIndex]);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx,cy,CELL/2-2,0,Math.PI*2);
  ctx.fill();
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawGrid();
  drawFood();
  drawSnake();
}

let lastTime = performance.now();
function loop(now){
  const dt = now-lastTime;
  lastTime = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

resetGame();
render();
requestAnimationFrame(loop);
</script>
</body>
</html>
