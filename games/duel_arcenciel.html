<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Duel Arc-en-ciel : Chat vs Grenouille</title>
<style>
  :root{
    --accent:#ff5fa2;
    --accent2:#7a5fff;
  }
  html,body{
    margin:0;
    height:100%;
    background:radial-gradient(ellipse at top, #2a1a5e, #0b1026);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Trebuchet MS', system-ui, sans-serif;
    overflow:hidden;
  }
  #wrap{
    position:relative;
    border-radius:12px;
    overflow:hidden;
    border:3px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  canvas{
    display:block;
    background:linear-gradient(180deg,#1c1440,#241a4d);
  }
  #hud{
    position:absolute;
    top:10px;
    left:14px;
    right:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    color:#fff;
    font-size:13px;
    font-weight:bold;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
    pointer-events:none;
    user-select:none;
  }
  .side{ display:flex; flex-direction:column; gap:4px; }
  .side.right{ align-items:flex-end; }
  .hearts{ font-size:18px; letter-spacing:2px; }
  #roundLabel{
    position:absolute;
    top:8px; left:50%; transform:translateX(-50%);
    color:#fff; font-weight:bold; font-size:14px;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
    pointer-events:none;
  }
  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
    background:rgba(10,8,30,0.62);
    backdrop-filter:blur(2px);
    padding:20px;
    box-sizing:border-box;
  }
  #overlay h1{
    margin:0 0 6px 0;
    font-size:24px;
    background:linear-gradient(90deg,#ff5f6d,#ffc371,#8fff5f,#5fdcff,#a15fff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  #overlay p{ margin:3px 0; font-size:13px; opacity:0.9; }
  .btnRow{ display:flex; gap:12px; margin-top:16px; flex-wrap:wrap; justify-content:center; }
  .btn{
    padding:11px 20px;
    font-size:15px;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    border:none;
    border-radius:26px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(255,95,162,0.5);
  }
  .btn:active{ transform:scale(0.96); }
  .btn.alt{ background:linear-gradient(90deg,#5fdcff,#3fa1ff); box-shadow:0 6px 18px rgba(95,220,255,0.4); }
  .hidden{ display:none !important; }
  #announce{
    position:absolute;
    top:44%;
    left:0; right:0;
    text-align:center;
    color:#fff;
    font-size:26px;
    font-weight:bold;
    text-shadow:0 3px 10px rgba(0,0,0,0.7);
    pointer-events:none;
    opacity:0;
    transition:opacity 0.2s;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="640" height="400"></canvas>
  <div id="hud">
    <div class="side left">
      <div>🐱 Chat</div>
      <div class="hearts" id="hearts1">❤️❤️❤️</div>
      <div>Manches : <span id="wins1">0</span></div>
    </div>
    <div class="side right">
      <div>🐸 Grenouille</div>
      <div class="hearts" id="hearts2">❤️❤️❤️</div>
      <div>Manches : <span id="wins2">0</span></div>
    </div>
  </div>
  <div id="roundLabel">Manche 1</div>
  <div id="announce"></div>
  <div id="overlay">
    <h1>⚔️ Duel Arc-en-ciel</h1>
    <p>🐱 Chat : ZQSD/WASD pour bouger, F pour tirer</p>
    <p>🐸 Grenouille : Flèches pour bouger, Entrée pour tirer</p>
    <p>Premier à gagner 2 manches remporte le duel !</p>
    <div class="btnRow">
      <button class="btn" id="play2Btn">🎮 2 joueurs</button>
      <button class="btn alt" id="play1Btn">🤖 1 joueur (vs IA)</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const announce = document.getElementById('announce');
const roundLabel = document.getElementById('roundLabel');
const hearts1El = document.getElementById('hearts1');
const hearts2El = document.getElementById('hearts2');
const wins1El = document.getElementById('wins1');
const wins2El = document.getElementById('wins2');

let mode = '2p'; // '2p' ou '1p'
let state = 'menu'; // menu | playing | roundEnd | matchEnd
let roundNum = 1;
let wins = [0,0];
const MAX_HEARTS = 3;
const WIN_ROUNDS = 2;

const rainbowColors = ['#ff5f6d','#ffc371','#f9f871','#8fff5f','#5fdcff','#a15fff'];

function makePlayer(x,y,facing){
  return {
    x, y, r:18,
    speed: 3.6,
    hearts: MAX_HEARTS,
    facingX: facing, facingY: 0,
    cooldown: 0,
    invuln: 0,
    hitFlash: 0
  };
}

let p1, p2;
let bullets = []; // {x,y,vx,vy,owner,colorIndex}

function resetRoundPositions(){
  p1 = makePlayer(90, H/2, 1);
  p2 = makePlayer(W-90, H/2, -1);
  bullets = [];
  updateHeartsUI();
}

function updateHeartsUI(){
  hearts1El.textContent = '❤️'.repeat(Math.max(p1.hearts,0)) + '🤍'.repeat(MAX_HEARTS-Math.max(p1.hearts,0));
  hearts2El.textContent = '❤️'.repeat(Math.max(p2.hearts,0)) + '🤍'.repeat(MAX_HEARTS-Math.max(p2.hearts,0));
  wins1El.textContent = wins[0];
  wins2El.textContent = wins[1];
  roundLabel.textContent = 'Manche ' + roundNum;
}

function showAnnounce(text, duration=1400){
  announce.textContent = text;
  announce.style.opacity = 1;
  setTimeout(()=>{ announce.style.opacity = 0; }, duration);
}

function startMatch(selectedMode){
  mode = selectedMode;
  wins = [0,0];
  roundNum = 1;
  resetRoundPositions();
  state = 'playing';
  overlay.classList.add('hidden');
  showAnnounce('Manche ' + roundNum + ' !', 1000);
}

function startNextRound(){
  roundNum++;
  resetRoundPositions();
  state = 'playing';
  showAnnounce('Manche ' + roundNum + ' !', 1000);
}

function endRound(loserIndex){
  const winnerIndex = loserIndex===0 ? 1 : 0;
  wins[winnerIndex]++;
  updateHeartsUI();
  if(wins[winnerIndex] >= WIN_ROUNDS){
    state = 'matchEnd';
    const winnerName = winnerIndex===0 ? '🐱 Le Chat' : '🐸 La Grenouille';
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h1>🏆 ${winnerName} remporte le duel !</h1>
      <p>Score final des manches : ${wins[0]} - ${wins[1]}</p>
      <div class="btnRow">
        <button class="btn" id="rematch2">🎮 Revanche à 2</button>
        <button class="btn alt" id="rematch1">🤖 Revanche vs IA</button>
      </div>`;
    document.getElementById('rematch2').addEventListener('click', ()=>startMatch('2p'));
    document.getElementById('rematch1').addEventListener('click', ()=>startMatch('1p'));
  } else {
    state = 'roundEnd';
    const winnerName = winnerIndex===0 ? '🐱 Chat gagne la manche !' : '🐸 Grenouille gagne la manche !';
    showAnnounce(winnerName, 1500);
    setTimeout(startNextRound, 1600);
  }
}

// ---------- Entrées clavier ----------
const keys = {};
window.addEventListener('keydown', (e)=>{
  keys[e.code] = true;
  if(state === 'playing'){
    if(e.code === 'KeyF') fire(p1, 0);
    if(e.code === 'Enter' && mode==='2p') fire(p2, 1);
  }
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','Enter'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', (e)=>{ keys[e.code] = false; });

document.getElementById('play2Btn').addEventListener('click', ()=>startMatch('2p'));
document.getElementById('play1Btn').addEventListener('click', ()=>startMatch('1p'));

// ---------- Tir ----------
function fire(p, owner){
  if(p.cooldown > 0) return;
  p.cooldown = 22;
  const speed = 7.5;
  bullets.push({
    x: p.x + p.facingX*p.r, y: p.y + p.facingY*p.r,
    vx: p.facingX*speed, vy: p.facingY*speed,
    owner,
    colorIndex: Math.floor(Math.random()*rainbowColors.length)
  });
}

// ---------- IA (mode 1 joueur) ----------
function updateAI(){
  const dx = p1.x - p2.x, dy = p1.y - p2.y;
  const dist = Math.hypot(dx,dy);

  // esquive si un projectile du chat approche
  let dodge = 0;
  for(const b of bullets){
    if(b.owner !== 0) continue;
    if(Math.abs(b.y-p2.y) < 40 && b.vx > 0 && b.x < p2.x && b.x > p2.x-220){
      dodge = (p2.y < H/2) ? -1 : 1;
    }
  }

  if(dodge !== 0){
    p2.y += dodge*p2.speed*1.3;
  } else {
    // se rapproche pour garder une distance moyenne, s'aligne verticalement
    if(dist > 260) p2.x -= p2.speed*0.6;
    else if(dist < 140) p2.x += p2.speed*0.6;

    if(Math.abs(dy) > 10){
      p2.y += Math.sign(dy)*p2.speed*0.9;
    }
  }

  p2.x = Math.max(p2.r, Math.min(W-p2.r, p2.x));
  p2.y = Math.max(p2.r, Math.min(H-p2.r, p2.y));

  p2.facingX = dx>=0 ? 1 : -1;
  p2.facingY = 0;

  if(Math.abs(dy) < 26 && p2.cooldown<=0 && Math.random()<0.9){
    fire(p2, 1);
  }
}

// ---------- Update ----------
function updatePlayerMovement(p, up,down,left,right){
  let mx=0, my=0;
  if(keys[up]) my -= 1;
  if(keys[down]) my += 1;
  if(keys[left]) mx -= 1;
  if(keys[right]) mx += 1;
  if(mx!==0 || my!==0){
    const len = Math.hypot(mx,my);
    mx/=len; my/=len;
    p.x += mx*p.speed;
    p.y += my*p.speed;
    p.facingX = mx; p.facingY = my;
  }
  p.x = Math.max(p.r, Math.min(W-p.r, p.x));
  p.y = Math.max(p.r, Math.min(H-p.r, p.y));
}

function update(){
  if(state !== 'playing') return;

  updatePlayerMovement(p1, 'KeyW','KeyS','KeyA','KeyD');
  if(mode==='2p'){
    updatePlayerMovement(p2, 'ArrowUp','ArrowDown','ArrowLeft','ArrowRight');
  } else {
    updateAI();
  }

  if(p1.cooldown>0) p1.cooldown--;
  if(p2.cooldown>0) p2.cooldown--;
  if(p1.invuln>0) p1.invuln--;
  if(p2.invuln>0) p2.invuln--;
  if(p1.hitFlash>0) p1.hitFlash--;
  if(p2.hitFlash>0) p2.hitFlash--;

  for(const b of bullets){ b.x += b.vx; b.y += b.vy; }
  bullets = bullets.filter(b => b.x>-20 && b.x<W+20 && b.y>-20 && b.y<H+20);

  for(const b of [...bullets]){
    const target = b.owner===0 ? p2 : p1;
    if(target.invuln>0) continue;
    const dx = target.x-b.x, dy = target.y-b.y;
    if(dx*dx+dy*dy < (target.r*0.85)*(target.r*0.85)){
      target.hearts--;
      target.invuln = 55;
      target.hitFlash = 14;
      bullets = bullets.filter(bb=>bb!==b);
      updateHeartsUI();
      if(target.hearts<=0){
        endRound(b.owner===0 ? 1 : 0);
      }
    }
  }
}

// ---------- Dessin ----------
function drawArena(){
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for(let i=0;i<10;i++){
    ctx.fillRect(i*(W/10), 0, 1, H);
  }
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 4;
  ctx.strokeRect(2,2,W-4,H-4);
  // ligne centrale
  ctx.setLineDash([8,10]);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.moveTo(W/2,0); ctx.lineTo(W/2,H);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawCatPlayer(p){
  ctx.save();
  ctx.translate(p.x,p.y);
  if(p.invuln>0 && Math.floor(p.invuln/5)%2===0){ ctx.globalAlpha = 0.4; }
  const flip = p.facingX < 0 ? -1 : 1;
  ctx.scale(flip,1);
  ctx.fillStyle = p.hitFlash>0 ? '#ffffff' : '#e8558a';
  ctx.beginPath();
  ctx.ellipse(0,4,17,14,0,0,Math.PI*2);
  ctx.fill();
  // oreilles
  ctx.beginPath();
  ctx.moveTo(-10,-8); ctx.lineTo(-6,-20); ctx.lineTo(-2,-8); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(2,-8); ctx.lineTo(6,-20); ctx.lineTo(10,-8); ctx.closePath(); ctx.fill();
  // yeux
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-6,-2,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,-2,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawFrogPlayer(p){
  ctx.save();
  ctx.translate(p.x,p.y);
  if(p.invuln>0 && Math.floor(p.invuln/5)%2===0){ ctx.globalAlpha = 0.4; }
  const flip = p.facingX < 0 ? -1 : 1;
  ctx.scale(flip,1);
  ctx.fillStyle = p.hitFlash>0 ? '#ffffff' : '#4caf6b';
  ctx.beginPath();
  ctx.ellipse(0,5,18,14,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath(); ctx.arc(-9,-9,7,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-9,7,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(-9,-9,2.6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(9,-9,2.6,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBullets(){
  for(const b of bullets){
    ctx.save();
    ctx.fillStyle = rainbowColors[b.colorIndex];
    ctx.beginPath();
    ctx.arc(b.x,b.y,6,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawArena();
  drawBullets();
  drawCatPlayer(p1);
  drawFrogPlayer(p2);
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

p1 = makePlayer(90,H/2,1);
p2 = makePlayer(W-90,H/2,-1);
render();
loop();
</script>
</body>
</html>
