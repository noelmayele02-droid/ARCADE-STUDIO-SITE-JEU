<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Cosmo Cat Invaders</title>
<style>
  :root{
    --sky-top:#0b1026;
    --sky-bottom:#241a4d;
    --accent:#ff5fa2;
    --accent2:#7a5fff;
  }
  html,body{
    margin:0;
    height:100%;
    background:radial-gradient(ellipse at top, var(--sky-bottom), var(--sky-top));
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Trebuchet MS', system-ui, sans-serif;
    overflow:hidden;
  }
  #wrap{
    position:relative;
    border-radius:12px;
    overflow:hidden;
    border:3px solid rgba(255,255,255,0.15);
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  canvas{
    display:block;
    background:linear-gradient(180deg, var(--sky-top), var(--sky-bottom));
    touch-action:none;
  }
  #hud{
    position:absolute;
    top:10px;
    left:14px;
    right:14px;
    display:flex;
    justify-content:space-between;
    color:#fff;
    font-size:18px;
    font-weight:bold;
    text-shadow:0 2px 6px rgba(0,0,0,0.6);
    pointer-events:none;
    user-select:none;
  }
  #overlay{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    color:white;
    text-align:center;
    background:rgba(10,8,30,0.6);
    backdrop-filter:blur(2px);
    padding:20px;
    box-sizing:border-box;
  }
  #overlay h1{
    margin:0 0 8px 0;
    font-size:26px;
    background:linear-gradient(90deg,#ff5f6d,#ffc371,#8fff5f,#5fdcff,#a15fff);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
  }
  #overlay p{
    margin:4px 0;
    font-size:14px;
    opacity:0.9;
  }
  .btn{
    margin-top:16px;
    padding:12px 26px;
    font-size:18px;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    border:none;
    border-radius:30px;
    cursor:pointer;
    box-shadow:0 6px 18px rgba(255,95,162,0.5);
  }
  .btn:active{ transform:scale(0.97); }
  .hidden{ display:none !important; }
  #mobileControls{
    position:absolute;
    bottom:10px;
    left:0;
    right:0;
    display:flex;
    justify-content:space-between;
    padding:0 16px;
    box-sizing:border-box;
    pointer-events:none;
  }
  .padBtn{
    pointer-events:auto;
    width:64px;
    height:64px;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
    border:2px solid rgba(255,255,255,0.25);
    color:#fff;
    font-size:26px;
    display:flex;
    align-items:center;
    justify-content:center;
    user-select:none;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="420" height="600"></canvas>
  <div id="hud">
    <span id="scoreLabel">Score: 0</span>
    <span id="livesLabel">❤️❤️❤️</span>
  </div>
  <div id="mobileControls">
    <div class="padBtn" id="leftBtn">◀</div>
    <div class="padBtn" id="fireBtn">✦</div>
    <div class="padBtn" id="rightBtn">▶</div>
  </div>
  <div id="overlay">
    <h1>🚀 Cosmo Cat Invaders 🐱</h1>
    <p>Flèches ← → ou boutons pour bouger</p>
    <p>ESPACE, clic, ou ✦ pour tirer des étoiles arc-en-ciel</p>
    <p>Détruis les envahisseurs avant qu'ils n'atterrissent !</p>
    <button class="btn" id="playBtn">Jouer</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const scoreLabel = document.getElementById('scoreLabel');
const livesLabel = document.getElementById('livesLabel');

let state = 'ready'; // ready | playing | dead | win
let score = 0;
let lives = 3;
let level = 1;

const player = {
  x: W/2,
  y: H-50,
  w: 40,
  h: 24,
  speed: 5,
  cooldown: 0
};

let keys = { left:false, right:false, fire:false };
let bullets = []; // joueur
let enemyBullets = [];
let enemies = [];
let enemyDir = 1;
let enemySpeed = 0.6;
let enemyDropTimer = 0;
let stars = [];

for(let i=0;i<70;i++){
  stars.push({x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.6+0.3, tw:Math.random()*Math.PI*2, sp:Math.random()*0.4+0.1});
}

const rainbowColors = ['#ff5f6d','#ffc371','#f9f871','#8fff5f','#5fdcff','#a15fff'];

function buildEnemies(){
  enemies = [];
  const cols = 6;
  const rows = 4 + Math.min(2, level-1);
  const gapX = 50, gapY = 42;
  const startX = (W - (cols-1)*gapX)/2;
  const startY = 60;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      enemies.push({
        x: startX + c*gapX,
        y: startY + r*gapY,
        w: 30, h: 22,
        alive: true,
        colorIndex: r % rainbowColors.length,
        wobble: Math.random()*Math.PI*2
      });
    }
  }
  enemySpeed = 0.6 + (level-1)*0.25;
  enemyDir = 1;
}

function resetGame(){
  score = 0;
  lives = 3;
  level = 1;
  player.x = W/2;
  bullets = [];
  enemyBullets = [];
  buildEnemies();
  updateHud();
}

function updateHud(){
  scoreLabel.textContent = 'Score: ' + score;
  livesLabel.textContent = '❤️'.repeat(Math.max(lives,0));
}

function startGame(){
  resetGame();
  state = 'playing';
  overlay.classList.add('hidden');
}

function nextLevel(){
  level++;
  bullets = [];
  enemyBullets = [];
  buildEnemies();
}

function loseLife(){
  lives--;
  updateHud();
  if(lives <= 0){
    endGame(false);
  } else {
    bullets = [];
    enemyBullets = [];
    player.x = W/2;
  }
}

function endGame(won){
  state = won ? 'win' : 'dead';
  overlay.classList.remove('hidden');
  overlay.innerHTML = won ?
    `<h1>🌟 Galaxie sauvée !</h1><p>Score final : <strong>${score}</strong></p><button class="btn" id="playBtn2">Rejouer</button>` :
    `<h1>💥 Envahis !</h1><p>Score final : <strong>${score}</strong></p><button class="btn" id="playBtn2">Rejouer</button>`;
  document.getElementById('playBtn2').addEventListener('click', startGame);
}

// ---------- Dessin ----------
function drawStars(){
  for(const st of stars){
    st.y += st.sp;
    if(st.y > H) st.y = 0;
    st.tw += 0.03;
    const a = 0.4 + Math.sin(st.tw)*0.4;
    ctx.save();
    ctx.globalAlpha = Math.max(a,0.1);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x, player.y);
  const s = 3;
  // petit vaisseau-chat pixel art original
  const rows = [
    "   RR   ",
    "  RRRR  ",
    " RRRRRR ",
    "WWRRRRWW",
    "WWWWWWWW",
    " O    O "
  ];
  const off = -rows[0].length*s/2;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<rows[r].length;c++){
      const ch = rows[r][c];
      if(ch===' ') continue;
      ctx.fillStyle = ch==='R' ? '#ff5fa2' : ch==='W' ? '#c9c9d1' : '#5fdcff';
      ctx.fillRect(off+c*s, -20+r*s, s, s);
    }
  }
  // oreilles de chat sur le vaisseau
  ctx.fillStyle = '#ff5fa2';
  ctx.beginPath();
  ctx.moveTo(-9,-21); ctx.lineTo(-5,-29); ctx.lineTo(-2,-21); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(2,-21); ctx.lineTo(5,-29); ctx.lineTo(9,-21); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawEnemy(e){
  if(!e.alive) return;
  ctx.save();
  ctx.translate(e.x, e.y);
  const wob = Math.sin(e.wobble)*2;
  ctx.translate(0, wob);
  ctx.fillStyle = rainbowColors[e.colorIndex];
  // petit envahisseur pixel art (forme générique, non issue d'une œuvre existante)
  const s = 2.6;
  const rows = [
    "  XXXX  ",
    " XXXXXX ",
    "XX XX XX",
    "XXXXXXXX",
    "X XXXX X",
    "X X  X X"
  ];
  const off = -rows[0].length*s/2;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<rows[r].length;c++){
      if(rows[r][c] !== 'X') continue;
      ctx.fillRect(off+c*s, -10+r*s, s, s);
    }
  }
  ctx.restore();
}

function drawBullets(){
  for(const b of bullets){
    ctx.fillStyle = rainbowColors[b.colorIndex];
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.fillStyle = '#ff6666';
  for(const b of enemyBullets){
    ctx.fillRect(b.x-2, b.y-6, 4, 12);
  }
}

// ---------- Logique ----------
function update(){
  if(state !== 'playing') return;

  // joueur
  if(keys.left) player.x -= player.speed;
  if(keys.right) player.x += player.speed;
  player.x = Math.max(24, Math.min(W-24, player.x));

  if(player.cooldown > 0) player.cooldown--;
  if(keys.fire && player.cooldown <= 0){
    bullets.push({x:player.x, y:player.y-24, vy:-7, colorIndex: Math.floor(Math.random()*rainbowColors.length)});
    player.cooldown = 14;
  }

  for(const b of bullets) b.y += b.vy;
  bullets = bullets.filter(b => b.y > -10);

  for(const b of enemyBullets) b.y += 4.2;
  enemyBullets = enemyBullets.filter(b => b.y < H+10);

  // deplacement ennemis
  let hitEdge = false;
  for(const e of enemies){
    if(!e.alive) continue;
    e.wobble += 0.08;
    if(e.x + 16 > W-10 || e.x - 16 < 10) hitEdge = true;
  }
  const dx = enemySpeed * enemyDir;
  for(const e of enemies){
    if(!e.alive) continue;
    e.x += dx;
  }
  if(hitEdge){
    enemyDir *= -1;
    for(const e of enemies){
      if(e.alive) e.y += 14;
    }
  }

  // tirs ennemis aleatoires
  enemyDropTimer++;
  if(enemyDropTimer > 40){
    enemyDropTimer = 0;
    const alive = enemies.filter(e=>e.alive);
    if(alive.length && Math.random() < 0.5){
      const shooter = alive[Math.floor(Math.random()*alive.length)];
      enemyBullets.push({x:shooter.x, y:shooter.y+12});
    }
  }

  // collisions balles joueur / ennemis
  for(const b of bullets){
    for(const e of enemies){
      if(!e.alive) continue;
      if(Math.abs(b.x-e.x) < 16 && Math.abs(b.y-e.y) < 14){
        e.alive = false;
        b.y = -999;
        score += 10;
        updateHud();
      }
    }
  }
  bullets = bullets.filter(b => b.y > -100);

  // collisions balles ennemies / joueur
  for(const b of enemyBullets){
    if(Math.abs(b.x-player.x) < 16 && Math.abs(b.y-player.y) < 16){
      b.y = H+999;
      loseLife();
    }
  }

  // ennemis atteignent le joueur
  for(const e of enemies){
    if(e.alive && e.y > player.y - 30){
      loseLife();
      e.y = -100;
      e.alive = false;
    }
  }

  // niveau termine
  if(enemies.every(e => !e.alive)){
    if(level >= 3){
      endGame(true);
    } else {
      nextLevel();
    }
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawStars();
  drawBullets();
  for(const e of enemies) drawEnemy(e);
  drawPlayer();

  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = '12px Trebuchet MS';
  ctx.textAlign = 'center';
  ctx.fillText('Niveau ' + level, W/2, 20);
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

// ---------- Controles ----------
window.addEventListener('keydown', (e)=>{
  if(e.code === 'ArrowLeft') keys.left = true;
  if(e.code === 'ArrowRight') keys.right = true;
  if(e.code === 'Space'){ e.preventDefault(); keys.fire = true; if(state==='ready') startGame(); }
});
window.addEventListener('keyup', (e)=>{
  if(e.code === 'ArrowLeft') keys.left = false;
  if(e.code === 'ArrowRight') keys.right = false;
  if(e.code === 'Space') keys.fire = false;
});

function bindHold(el, onDown, onUp){
  el.addEventListener('mousedown', onDown);
  el.addEventListener('mouseup', onUp);
  el.addEventListener('mouseleave', onUp);
  el.addEventListener('touchstart', (e)=>{e.preventDefault(); onDown();}, {passive:false});
  el.addEventListener('touchend', (e)=>{e.preventDefault(); onUp();}, {passive:false});
}
bindHold(document.getElementById('leftBtn'), ()=>keys.left=true, ()=>keys.left=false);
bindHold(document.getElementById('rightBtn'), ()=>keys.right=true, ()=>keys.right=false);
bindHold(document.getElementById('fireBtn'), ()=>{keys.fire=true; if(state==='ready') startGame();}, ()=>keys.fire=false);

canvas.addEventListener('mousedown', ()=>{ keys.fire = true; if(state==='ready') startGame(); });
canvas.addEventListener('mouseup', ()=>{ keys.fire = false; });

document.getElementById('playBtn').addEventListener('click', startGame);

resetGame();
render();
loop();
</script>
</body>
</html>
