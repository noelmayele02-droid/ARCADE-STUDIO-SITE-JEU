<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Saute de Nuage en Nuage</title>
<style>
  :root{ --accent:#ff5fa2; --accent2:#7a5fff; }
  html,body{
    margin:0; height:100%;
    background:radial-gradient(ellipse at top, #2a1a5e, #0b1026);
    display:flex; align-items:center; justify-content:center;
    font-family:'Trebuchet MS', system-ui, sans-serif;
    overflow:hidden;
  }
  #wrap{ position:relative; border-radius:12px; overflow:hidden; border:3px solid rgba(255,255,255,0.15); box-shadow:0 20px 60px rgba(0,0,0,0.5); }
  canvas{ display:block; background:linear-gradient(180deg,#1c1440,#3a2a6d); touch-action:none; }
  #hud{ position:absolute; top:10px; left:14px; right:14px; display:flex; justify-content:space-between; color:#fff; font-size:16px; font-weight:bold; text-shadow:0 2px 6px rgba(0,0,0,0.6); pointer-events:none; user-select:none; }
  #overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; text-align:center; background:rgba(10,8,30,0.62); backdrop-filter:blur(2px); padding:20px; box-sizing:border-box; }
  #overlay h1{ margin:0 0 8px 0; font-size:24px; background:linear-gradient(90deg,#ff5f6d,#ffc371,#8fff5f,#5fdcff,#a15fff); -webkit-background-clip:text; background-clip:text; color:transparent; }
  #overlay p{ margin:4px 0; font-size:13px; opacity:0.9; }
  .btn{ margin-top:16px; padding:12px 26px; font-size:18px; font-weight:bold; color:white; background:linear-gradient(90deg,var(--accent),var(--accent2)); border:none; border-radius:30px; cursor:pointer; box-shadow:0 6px 18px rgba(255,95,162,0.5); }
  .btn:active{ transform:scale(0.97); }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="380" height="560"></canvas>
  <div id="hud">
    <span id="scoreLabel">Hauteur : 0 m</span>
    <span id="bestLabel">Record : 0 m</span>
  </div>
  <div id="overlay">
    <h1>☁️🐱 Saute de Nuage en Nuage</h1>
    <p>Bouge la souris ou ton doigt pour diriger le chat</p>
    <p>(ou les flèches ← →)</p>
    <p>Rebondis sur les nuages, ramasse les pièces, évite les monstres</p>
    <p>Ne tombe pas en bas de l'écran !</p>
    <button class="btn" id="playBtn">Jouer</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const overlay = document.getElementById('overlay');
const scoreLabel = document.getElementById('scoreLabel');
const bestLabel = document.getElementById('bestLabel');

let state = 'ready';
let best = 0;
let height = 0;
let cameraY = 0;

const player = { x: W/2, y: 0, vy:0, vx:0, w:30, h:32 };
const GRAVITY = 0.32;
const BOUNCE = -11.5;
const BIG_BOUNCE = -15.5;

let platforms = [];
let monsters = [];
let coins = [];
let particles = [];
const rainbowColors = ['#ff5f6d','#ffc371','#f9f871','#8fff5f','#5fdcff','#a15fff'];

function rand(a,b){ return Math.random()*(b-a)+a; }

function resetGame(){
  height = 0;
  cameraY = 0;
  player.x = W/2; player.y = H-80; player.vy = BOUNCE; player.vx = 0;
  platforms = [];
  monsters = [];
  coins = [];
  particles = [];

  // plateforme de depart large
  platforms.push({x:W/2, y:H-40, w:80, type:'normal'});
  let y = H-140;
  while(y > -600){
    genPlatformAt(y);
    y -= rand(60,100);
  }
  updateHud();
}

function genPlatformAt(y){
  const x = rand(40, W-40);
  const r = Math.random();
  let type = 'normal';
  if(r < 0.12) type='moving';
  else if(r < 0.2) type='fragile';
  else if(r < 0.28) type='spring';
  platforms.push({x,y,w:56,type, dir:1});

  if(Math.random()<0.22){
    monsters.push({x: rand(40,W-40), y: y-30, r:16, colorIndex:Math.floor(Math.random()*rainbowColors.length), wobble:Math.random()*Math.PI*2, alive:true});
  }
  if(Math.random()<0.35){
    coins.push({x, y:y-26, r:8, taken:false});
  }
}

function updateHud(){
  scoreLabel.textContent = 'Hauteur : ' + Math.floor(height) + ' m';
  bestLabel.textContent = 'Record : ' + Math.floor(best) + ' m';
}

function startGame(){
  resetGame();
  state = 'playing';
  overlay.classList.add('hidden');
}

function endGame(){
  state = 'dead';
  best = Math.max(best, height);
  updateHud();
  overlay.classList.remove('hidden');
  overlay.innerHTML = `<h1>💫 Chute !</h1><p>Hauteur atteinte : <strong>${Math.floor(height)} m</strong></p><p>Record : <strong>${Math.floor(best)} m</strong></p><button class="btn" id="playBtn2">Rejouer</button>`;
  document.getElementById('playBtn2').addEventListener('click', startGame);
}

function spawnParticles(x,y,color){
  for(let i=0;i<10;i++){
    const a = Math.random()*Math.PI*2, sp = rand(1,3);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:22,color});
  }
}

// ---------- Contrôles ----------
let targetX = null;
const keys = {};
window.addEventListener('keydown',(e)=>{
  keys[e.code]=true;
  if(state==='ready') startGame();
});
window.addEventListener('keyup',(e)=>{ keys[e.code]=false; });

canvas.addEventListener('mousemove',(e)=>{
  const rect = canvas.getBoundingClientRect();
  targetX = (e.clientX-rect.left) * (W/rect.width);
});
canvas.addEventListener('touchmove',(e)=>{
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  targetX = (e.touches[0].clientX-rect.left) * (W/rect.width);
}, {passive:false});
canvas.addEventListener('touchstart',(e)=>{ if(state==='ready') startGame(); }, {passive:false});
canvas.addEventListener('mousedown',()=>{ if(state==='ready') startGame(); });

document.getElementById('playBtn').addEventListener('click', startGame);

// ---------- Update ----------
function update(){
  if(state!=='playing') return;

  if(keys['ArrowLeft']) player.vx = -4.4;
  else if(keys['ArrowRight']) player.vx = 4.4;
  else if(targetX!==null){
    const dx = targetX-player.x;
    player.vx = Math.max(-5.5, Math.min(5.5, dx*0.12));
  } else {
    player.vx *= 0.9;
  }
  player.x += player.vx;
  if(player.x < -20) player.x = W+20;
  if(player.x > W+20) player.x = -20;

  player.vy += GRAVITY;
  player.y += player.vy;

  // scroll camera si le joueur monte dans le tiers superieur
  if(player.y < H*0.42){
    const dy = H*0.42-player.y;
    player.y = H*0.42;
    cameraY += dy;
    height += dy*0.05;
    for(const p of platforms) p.y += dy;
    for(const m of monsters) m.y += dy;
    for(const c of coins) c.y += dy;
    for(const pt of particles) pt.y += dy;
  }

  // plateformes mobiles
  for(const p of platforms){
    if(p.type==='moving'){
      p.x += p.dir*1.4;
      if(p.x<40||p.x>W-40) p.dir*=-1;
    }
  }

  // collisions plateformes (uniquement quand on descend)
  if(player.vy > 0){
    for(const p of platforms){
      if(p.dead) continue;
      const px = p.x, py = p.y;
      if(player.x+player.w*0.3 > px-p.w/2 && player.x-player.w*0.3 < px+p.w/2 &&
         player.y+player.h/2 > py && player.y+player.h/2 < py+14 ){
        if(p.type==='fragile'){
          p.dead = true;
          spawnParticles(px,py,'#a15fff');
        } else if(p.type==='spring'){
          player.vy = BIG_BOUNCE;
          spawnParticles(px,py,'#5fdcff');
        } else {
          player.vy = BOUNCE;
        }
      }
    }
  }
  platforms = platforms.filter(p=>!p.dead && p.y < H+2500 - (0)); // garde large marge, nettoyage ci-dessous

  // nettoyage / generation vers le haut
  platforms = platforms.filter(p => p.y < H+40);
  while(platforms.length < 9){
    const topY = Math.min(...platforms.map(p=>p.y), 0);
    genPlatformAt(topY - rand(60,100));
  }

  // monstres
  for(const m of monsters){
    if(!m.alive) continue;
    m.wobble += 0.08;
    const dx = player.x-m.x, dy = player.y-m.y;
    if(dx*dx+dy*dy < (player.w*0.4+m.r)*(player.w*0.4+m.r)){
      endGame();
      return;
    }
  }
  monsters = monsters.filter(m => m.y < H+40);

  // pieces
  for(const c of coins){
    if(c.taken) continue;
    const dx = player.x-c.x, dy=player.y-c.y;
    if(dx*dx+dy*dy < (player.w*0.5+c.r)*(player.w*0.5+c.r)){
      c.taken = true;
      spawnParticles(c.x,c.y,'#ffe066');
    }
  }
  coins = coins.filter(c => !c.taken && c.y < H+40);

  for(let i=particles.length-1;i>=0;i--){
    const pt = particles[i];
    pt.x+=pt.vx; pt.y+=pt.vy; pt.life--;
    if(pt.life<=0) particles.splice(i,1);
  }

  if(player.y - player.h/2 > H){
    endGame();
    return;
  }

  updateHud();
}

// ---------- Dessin ----------
function drawPlatform(p){
  if(p.dead) return;
  ctx.save();
  ctx.translate(p.x,p.y);
  let color = '#7a5fff';
  if(p.type==='fragile') color = '#ff5f6d';
  if(p.type==='spring') color = '#5fdcff';
  if(p.type==='moving') color = '#ffc371';
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-p.w/2,-6,p.w,12,6);
  ctx.fill();
  if(p.type==='spring'){
    ctx.strokeStyle = '#0b1026';
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(-8,-6); ctx.lineTo(0,-16); ctx.lineTo(8,-6);
    ctx.stroke();
  }
  ctx.restore();
}

function drawMonster(m){
  if(!m.alive) return;
  ctx.save();
  ctx.translate(m.x, m.y+Math.sin(m.wobble)*3);
  ctx.fillStyle = rainbowColors[m.colorIndex];
  ctx.beginPath();
  ctx.arc(0,0,m.r,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(-5,-2,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-2,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(-5,-2,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-2,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawCoin(c){
  ctx.save();
  ctx.translate(c.x,c.y);
  const grad = ctx.createRadialGradient(-2,-2,1,0,0,c.r);
  grad.addColorStop(0,'#fff7c2');
  grad.addColorStop(0.5,'#ffd84d');
  grad.addColorStop(1,'#e8a800');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawPlayer(){
  ctx.save();
  ctx.translate(player.x, player.y);
  const tilt = Math.max(-0.35, Math.min(0.35, player.vx*0.05));
  ctx.rotate(tilt);
  const squish = player.vy < 0 ? 1.08 : 0.94;
  ctx.scale(1/squish, squish);

  ctx.fillStyle = '#e8558a';
  ctx.beginPath();
  ctx.ellipse(0,2,15,15,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-9,-9); ctx.lineTo(-5,-21); ctx.lineTo(-1,-9); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(1,-9); ctx.lineTo(5,-21); ctx.lineTo(9,-9); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.arc(-5,-1,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-1,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawParticles(){
  for(const p of particles){
    ctx.save();
    ctx.globalAlpha = Math.max(p.life/22,0);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

function drawBackgroundStars(){
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#fff';
  for(let i=0;i<30;i++){
    const x = (i*97 + (cameraY*0.2)) % W;
    const y = (i*53) % H;
    ctx.fillRect(x, y, 1.5, 1.5);
  }
  ctx.restore();
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawBackgroundStars();
  for(const p of platforms) drawPlatform(p);
  drawParticles();
  for(const c of coins) if(!c.taken) drawCoin(c);
  for(const m of monsters) drawMonster(m);
  drawPlayer();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

resetGame();
render();
loop();
</script>
</body>
</html>
