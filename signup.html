<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — Arcade Studio</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body class="crt">

<nav class="nav">
  <a href="index.html" class="brand"><span class="dot"></span> ARCADE STUDIO</a>
  <button class="navToggle" id="navToggle" aria-label="Menu">☰</button>
  <ul id="navMenu">
    <li><a class="link" href="index.html#equipe">Notre équipe</a></li>
    <li><a class="link" href="games.html">Jouer</a></li>
    <li id="navAuthSlot" style="display:flex;gap:12px;align-items:center;"></li>
  </ul>
</nav>

<section class="section wrap">
  <div class="cabinet authWrap">
    <div class="cabinet-inner">
      <p class="eyebrow center">// inscription</p>
      <h1 class="display center" style="font-size:20px; margin:10px 0 24px;">Rejoins l'arcade</h1>

      <div id="formMsg" class="formMsg"></div>

      <form id="signupForm">
        <div class="field">
          <label for="pseudo">Pseudo</label>
          <input type="text" id="pseudo" required minlength="2" autocomplete="nickname">
        </div>
        <div class="field">
          <label for="email">Adresse e-mail</label>
          <input type="email" id="email" required autocomplete="email">
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password">
        </div>
        <div class="field">
          <label for="password2">Confirme le mot de passe</label>
          <input type="password" id="password2" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Créer mon compte</button>
      </form>

      <p class="authSwitch">Déjà un compte ? <a href="login.html">Se connecter</a></p>
    </div>
  </div>
</section>

<footer>
  <span>© <span id="year"></span> Arcade Studio</span>
  <span><a href="index.html">Retour à l'accueil</a></span>
</footer>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/auth.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

const formMsg = document.getElementById('formMsg');
const signupForm = document.getElementById('signupForm');

signupForm.addEventListener('submit', (e)=>{
  e.preventDefault();
  formMsg.textContent = '';
  formMsg.className = 'formMsg';

  const pseudo = document.getElementById('pseudo').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const password2 = document.getElementById('password2').value;

  if(password !== password2){
    formMsg.textContent = "Les deux mots de passe ne correspondent pas.";
    formMsg.className = 'formMsg error';
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then((cred)=> cred.user.updateProfile({ displayName: pseudo }))
    .then(()=>{
      formMsg.textContent = 'Compte créé ! Redirection...';
      formMsg.className = 'formMsg success';
      setTimeout(()=>{ window.location.href = 'games.html'; }, 700);
    })
    .catch((err)=>{
      formMsg.textContent = traduireErreur(err.code);
      formMsg.className = 'formMsg error';
    });
});

function traduireErreur(code){
  const map = {
    'auth/email-already-in-use': "Cet e-mail est déjà utilisé par un compte.",
    'auth/invalid-email': "Adresse e-mail invalide.",
    'auth/weak-password': "Mot de passe trop court (6 caractères minimum).",
  };
  return map[code] || "Une erreur est survenue. Vérifie que Firebase est bien configuré (js/firebase-config.js).";
}
</script>
</body>
</html>
